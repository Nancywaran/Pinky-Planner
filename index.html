<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinky Planner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd6ea, #ffeef7, #ffc2df);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(15px);
      border-radius: 35px;
      padding: 35px;
      box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
      border: 3px solid rgba(255,255,255,0.5);
    }

    .title {
      text-align: center;
      font-size: 3rem;
      color: #ff4f9a;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #b85d8d;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .cute-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .cute-card {
      background: white;
      padding: 12px 20px;
      border-radius: 20px;
      color: #ff4f9a;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.15);
    }

    .planner-box {
      background: rgba(255,255,255,0.7);
      padding: 25px;
      border-radius: 30px;
    }

    .input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    input {
      flex: 1;
      min-width: 200px;
      padding: 15px;
      border: none;
      border-radius: 18px;
      background: white;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.1);
    }

    .add-btn {
      border: none;
      padding: 15px 25px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff69b4, #ff4f9a);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(255, 105, 180, 0.3);
    }

    .add-btn:hover {
      transform: scale(1.05);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .task {
      background: white;
      padding: 18px;
      border-radius: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.1);
      animation: fadeIn 0.3s ease;
    }

    .task-info h3 {
      color: #ff4f9a;
      margin-bottom: 5px;
    }

    .task-info p {
      color: #777;
      font-size: 0.95rem;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .cute-btn {
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .done {
      background: #d6ffd6;
    }

    .delete {
      background: #ffd6e8;
    }

    .cute-btn:hover {
      transform: scale(1.1);
    }

    .completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .character {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 5rem;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    @media(max-width: 768px) {
      .title {
        font-size: 2.2rem;
      }

      .task {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .action-buttons {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">🎀 Pinky Planner 🎀</h1>
    <p class="subtitle">Cute aesthetic schedule maker for productive girlies ✨</p>

    <div class="cute-row">
      <div class="cute-card">💗 Study</div>
      <div class="cute-card">🌸 Self Care</div>
      <div class="cute-card">🧸 Work</div>
      <div class="cute-card">☕ Break Time</div>
    </div>

    <div class="planner-box">
      <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter your cute schedule...">
        <input type="time" id="timeInput">
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>

      <div class="task-list" id="taskList"></div>
    </div>
  </div>

  <div class="character">🐰</div>

  <script>
    function addTask() {
      const taskInput = document.getElementById('taskInput');
      const timeInput = document.getElementById('timeInput');
      const taskList = document.getElementById('taskList');

      if(taskInput.value === '') {
        alert('Please enter a schedule 💗');
        return;
      }

      const task = document.createElement('div');
      task.classList.add('task');

      task.innerHTML = `
        <div class="task-info">
          <h3>${taskInput.value}</h3>
         <p data-time=\"${timeInput.value}\">⏰ ${formatTime(timeInput.value)}</p>
        </div>

        <div class="action-buttons">
          <button class="cute-btn done" onclick="completeTask(this)">✔</button>
          <button class="cute-btn delete" onclick="deleteTask(this)">🗑</button>
        </div>
      `;

      taskList.appendChild(task);
      saveTasks();

      taskInput.value = '';
      timeInput.value = '';
    }

    function deleteTask(button) {
      button.parentElement.parentElement.remove();
      saveTasks();
    }

    function completeTask(button) {
      const task = button.parentElement.parentElement;
      task.classList.toggle('completed');
      saveTasks();
    }
    function saveTasks() {
  localStorage.setItem('pinkyTasks', taskList.innerHTML);
}

function loadTasks() {
  const savedTasks = localStorage.getItem('pinkyTasks');

  if(savedTasks) {
    taskList.innerHTML = savedTasks;
  }
}

window.onload = loadTasks;
    function formatTime(time) {
  if (!time) return 'No Time Added';

  let [hours, minutes] = time.split(':');

  hours = parseInt(hours);

  let ampm = hours >= 12 ? 'PM' : 'AM';

  hours = hours % 12;
  hours = hours ? hours : 12;

  return `${hours}:${minutes} ${ampm}`;
}
    setInterval(checkAlarm, 1000);

function checkAlarm() {
  const now = new Date();

  let currentHours = now.getHours().toString().padStart(2, '0');
  let currentMinutes = now.getMinutes().toString().padStart(2, '0');

  let currentTime = `${currentHours}:${currentMinutes}`;

  const tasks = document.querySelectorAll('.task');

  tasks.forEach(task => {
    const taskTime = task.querySelector('p').dataset.time;

    if(taskTime.includes(currentTime)) {

      alert('🎀 Reminder: ' + task.querySelector('h3').innerText);

      const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
      audio.play();
    }
  });
}
  </script>

</body>
</html>
